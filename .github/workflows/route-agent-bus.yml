name: Route AgentBus

on:
  push:
    paths:
      - "agent_bus/**"
      - "agentbus/**"
  issue_comment:
  pull_request_review:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e .[dev]
      - name: Route event
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: agentbus route --event-name "$GITHUB_EVENT_NAME" --event-file "$GITHUB_EVENT_PATH" --json > routing.json
      - name: Post routing comment
        if: ${{ github.event_name == 'issue_comment' || github.event_name == 'pull_request_review' }}
        uses: actions/github-script@v7
        env:
          ROUTING_JSON: routing.json
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync(process.env.ROUTING_JSON, 'utf8'));
            const commentBody = (report.comment_body || '').trim();
            if (!commentBody) {
              core.info('No routing comment to post.');
              return;
            }

            const eventComment = context.payload.comment?.body || context.payload.review?.body || '';
            const eventAuthor = context.payload.comment?.user?.login || context.payload.review?.user?.login || '';
            if (eventAuthor === 'github-actions[bot]' || eventComment.includes('<!-- agentbus-routed -->')) {
              core.info('Skipping self-authored routing comment.');
              return;
            }

            const issueNumber = context.payload.issue?.number || context.payload.pull_request?.number;
            if (!issueNumber) {
              core.info('No issue or pull request number available.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: commentBody,
            });
