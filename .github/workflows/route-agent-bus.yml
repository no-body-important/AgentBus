name: Route AgentBus

on:
  push:
    paths:
      - "agent_bus/**"
      - "agentbus/**"
  issue_comment:
  pull_request_review:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e .[dev]
      - name: Route event
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: agentbus route --event-name "$GITHUB_EVENT_NAME" --event-file "$GITHUB_EVENT_PATH" --json
